<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 780" width="1100" height="780" font-family="'Segoe UI', Arial, sans-serif">

  <!-- Background -->
  <rect width="1100" height="780" fill="#0f1117"/>

  <!-- Title -->
  <text x="550" y="38" text-anchor="middle" fill="#e2e8f0" font-size="18" font-weight="700" letter-spacing="1">Agentic Playwright Test Generation Pipeline</text>

  <!-- ── LEGEND ── -->
  <rect x="30" y="55" width="14" height="14" rx="3" fill="#3b82f6"/>
  <text x="50" y="66" fill="#94a3b8" font-size="12">State</text>
  <rect x="110" y="55" width="14" height="14" rx="3" fill="#7c3aed"/>
  <text x="130" y="66" fill="#94a3b8" font-size="12">Agent invoked</text>
  <rect x="255" y="55" width="14" height="14" rx="3" fill="#0f7960"/>
  <text x="275" y="66" fill="#94a3b8" font-size="12">Done</text>
  <rect x="330" y="55" width="14" height="14" rx="3" fill="#9f1239"/>
  <text x="350" y="66" fill="#94a3b8" font-size="12">Failed</text>

  <!-- ═══════════════════════════════════════════════
       MAIN FLOW  (top row + middle row)
       ═══════════════════════════════════════════════ -->

  <!-- ROW 1: analyze_plan → check_pom → build_pom → validate_pom -->

  <!-- analyze_plan -->
  <rect x="30" y="110" width="130" height="52" rx="8" fill="#1e40af" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="95" y="131" text-anchor="middle" fill="#bfdbfe" font-size="11" font-weight="600">ANALYZE</text>
  <text x="95" y="148" text-anchor="middle" fill="#bfdbfe" font-size="11" font-weight="600">PLAN</text>

  <!-- arrow → check_pom -->
  <line x1="160" y1="136" x2="194" y2="136" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- check_pom -->
  <rect x="194" y="110" width="130" height="52" rx="8" fill="#1e40af" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="259" y="131" text-anchor="middle" fill="#bfdbfe" font-size="11" font-weight="600">CHECK</text>
  <text x="259" y="148" text-anchor="middle" fill="#bfdbfe" font-size="11" font-weight="600">POM</text>

  <!-- arrow → build_pom -->
  <line x1="324" y1="136" x2="358" y2="136" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="341" y="126" text-anchor="middle" fill="#64748b" font-size="9">missing</text>

  <!-- build_pom (agent) -->
  <rect x="358" y="110" width="130" height="52" rx="8" fill="#4c1d95" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="423" y="131" text-anchor="middle" fill="#e9d5ff" font-size="11" font-weight="600">BUILD</text>
  <text x="423" y="148" text-anchor="middle" fill="#e9d5ff" font-size="11" font-weight="600">POM ✦</text>

  <!-- arrow → validate_pom -->
  <line x1="488" y1="136" x2="522" y2="136" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- validate_pom -->
  <rect x="522" y="110" width="130" height="52" rx="8" fill="#1e40af" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="587" y="131" text-anchor="middle" fill="#bfdbfe" font-size="11" font-weight="600">VALIDATE</text>
  <text x="587" y="148" text-anchor="middle" fill="#bfdbfe" font-size="11" font-weight="600">POM</text>

  <!-- validate_pom → FAILED (fatal) -->
  <line x1="652" y1="121" x2="730" y2="90" stroke="#f43f5e" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrRed)"/>
  <text x="686" y="100" text-anchor="middle" fill="#f43f5e" font-size="9">fatal</text>

  <!-- FAILED box (top right) -->
  <rect x="730" y="60" width="110" height="48" rx="8" fill="#500724" stroke="#9f1239" stroke-width="1.5"/>
  <text x="785" y="80" text-anchor="middle" fill="#fda4af" font-size="12" font-weight="700">FAILED</text>
  <text x="785" y="97" text-anchor="middle" fill="#fda4af" font-size="10">✕</text>

  <!-- ── ROW 2: write_test → validate_test → run_test ── -->

  <!-- Down arrow from validate_pom to write_test row -->
  <!-- check_pom → write_test direct (exists) -->
  <!-- We draw both paths: a curved "exists" skip from check_pom down-right, and validate_pom → write_test -->

  <!-- validate_pom → write_test arrow (going right then down) -->
  <polyline points="587,162 587,222 696,222" fill="none" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- check_pom → write_test (exists path - skip build_pom) -->
  <polyline points="259,162 259,200 696,200 696,222" fill="none" stroke="#475569" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <text x="478" y="194" text-anchor="middle" fill="#64748b" font-size="9">exists — skip POM build</text>

  <!-- write_test (agent) -->
  <rect x="696" y="196" width="130" height="52" rx="8" fill="#4c1d95" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="761" y="217" text-anchor="middle" fill="#e9d5ff" font-size="11" font-weight="600">WRITE</text>
  <text x="761" y="234" text-anchor="middle" fill="#e9d5ff" font-size="11" font-weight="600">TEST ✦</text>

  <!-- arrow → validate_test -->
  <line x1="826" y1="222" x2="860" y2="222" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- validate_test -->
  <rect x="860" y="196" width="130" height="52" rx="8" fill="#1e40af" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="925" y="217" text-anchor="middle" fill="#bfdbfe" font-size="11" font-weight="600">VALIDATE</text>
  <text x="925" y="234" text-anchor="middle" fill="#bfdbfe" font-size="11" font-weight="600">TEST</text>

  <!-- validate_test → write_test retry loop -->
  <path d="M 925,248 Q 925,275 843,275 Q 761,275 761,248" fill="none" stroke="#f59e0b" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrAmb)"/>
  <text x="843" y="286" text-anchor="middle" fill="#f59e0b" font-size="9">retry (max 1)</text>

  <!-- validate_test → FAILED -->
  <line x1="990" y1="207" x2="1050" y2="150" stroke="#f43f5e" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrRed)"/>
  <rect x="1000" y="110" width="90" height="48" rx="8" fill="#500724" stroke="#9f1239" stroke-width="1.5"/>
  <text x="1045" y="130" text-anchor="middle" fill="#fda4af" font-size="12" font-weight="700">FAILED</text>
  <text x="1045" y="147" text-anchor="middle" fill="#fda4af" font-size="10">max retry</text>

  <!-- ── ROW 3: run_test ── -->

  <!-- validate_test → run_test (down) -->
  <polyline points="925,248 925,320 761,320 761,358" fill="none" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- run_test -->
  <rect x="696" y="358" width="130" height="52" rx="8" fill="#1e40af" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="761" y="379" text-anchor="middle" fill="#bfdbfe" font-size="11" font-weight="600">RUN</text>
  <text x="761" y="396" text-anchor="middle" fill="#bfdbfe" font-size="11" font-weight="600">TEST</text>

  <!-- run_test → DONE -->
  <line x1="826" y1="384" x2="900" y2="384" stroke="#10b981" stroke-width="1.8" marker-end="url(#arrGreen)"/>
  <text x="863" y="375" text-anchor="middle" fill="#10b981" font-size="9">all pass</text>

  <!-- DONE box -->
  <rect x="900" y="358" width="110" height="52" rx="8" fill="#064e3b" stroke="#10b981" stroke-width="1.5"/>
  <text x="955" y="379" text-anchor="middle" fill="#6ee7b7" font-size="12" font-weight="700">DONE</text>
  <text x="955" y="396" text-anchor="middle" fill="#6ee7b7" font-size="10">✓</text>

  <!-- run_test → classify_failure (down, on failure) -->
  <line x1="761" y1="410" x2="761" y2="450" stroke="#f43f5e" stroke-width="1.5" marker-end="url(#arrRed)"/>
  <text x="782" y="433" fill="#f43f5e" font-size="9">failures</text>

  <!-- ── ROW 4: classify_failure → heal / pom_builder ── -->

  <!-- classify_failure -->
  <rect x="696" y="450" width="130" height="52" rx="8" fill="#1e40af" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="761" y="471" text-anchor="middle" fill="#bfdbfe" font-size="11" font-weight="600">CLASSIFY</text>
  <text x="761" y="488" text-anchor="middle" fill="#bfdbfe" font-size="11" font-weight="600">FAILURE</text>

  <!-- classify → HEAL (right) -->
  <line x1="826" y1="476" x2="880" y2="476" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="853" y="467" text-anchor="middle" fill="#64748b" font-size="9">locator/</text>
  <text x="853" y="478" text-anchor="middle" fill="#64748b" font-size="9">assert</text>

  <!-- HEAL (agent) -->
  <rect x="880" y="450" width="130" height="52" rx="8" fill="#4c1d95" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="945" y="471" text-anchor="middle" fill="#e9d5ff" font-size="11" font-weight="600">HEAL ✦</text>
  <text x="945" y="488" text-anchor="middle" fill="#e9d5ff" font-size="9">(patch files)</text>

  <!-- HEAL → run_test loop back (arc up) -->
  <path d="M 945,502 Q 945,540 850,540 Q 720,540 720,540 Q 680,540 680,476 Q 680,430 696,410 Q 700,400 720,395 Q 740,388 761,388" fill="none" stroke="#7c3aed" stroke-width="1.3" stroke-dasharray="5,3" marker-end="url(#arrPurp)"/>
  <text x="680" y="545" fill="#a78bfa" font-size="9">re-run tests</text>

  <!-- classify → pom_builder route (left arrow then up) -->
  <polyline points="696,476 560,476 560,136 522,136" fill="none" stroke="#f59e0b" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrAmb)"/>
  <text x="590" y="468" fill="#f59e0b" font-size="9">missing</text>
  <text x="590" y="479" fill="#f59e0b" font-size="9">method/import</text>

  <!-- classify → ABORT -->
  <line x1="761" y1="502" x2="761" y2="560" stroke="#f43f5e" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrRed)"/>
  <text x="785" y="535" fill="#f43f5e" font-size="9">infra / repeat</text>
  <rect x="696" y="560" width="130" height="48" rx="8" fill="#500724" stroke="#9f1239" stroke-width="1.5"/>
  <text x="761" y="580" text-anchor="middle" fill="#fda4af" font-size="12" font-weight="700">FAILED</text>
  <text x="761" y="597" text-anchor="middle" fill="#fda4af" font-size="10">abort / guardrail</text>

  <!-- HEAL → FAILED (max attempts) -->
  <line x1="1010" y1="476" x2="1060" y2="476" stroke="#f43f5e" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrRed)"/>
  <rect x="1060" y="452" width="30" height="48" rx="4" fill="#500724" stroke="#9f1239" stroke-width="1.5"/>
  <text x="1075" y="469" text-anchor="middle" fill="#fda4af" font-size="9" font-weight="700">F</text>
  <text x="1075" y="482" text-anchor="middle" fill="#fda4af" font-size="9">A</text>
  <text x="1075" y="495" text-anchor="middle" fill="#fda4af" font-size="9">I</text>

  <!-- ── GUARDRAILS box ── -->
  <rect x="30" y="440" width="310" height="148" rx="10" fill="#1e2435" stroke="#334155" stroke-width="1.2"/>
  <text x="185" y="462" text-anchor="middle" fill="#94a3b8" font-size="12" font-weight="700">GUARDRAILS</text>
  <line x1="50" y1="468" x2="320" y2="468" stroke="#334155" stroke-width="1"/>
  <text x="50" y="486" fill="#64748b" font-size="11">Max total agent invocations</text>
  <text x="315" y="486" text-anchor="end" fill="#f87171" font-size="11" font-weight="600">5</text>
  <text x="50" y="506" fill="#64748b" font-size="11">POM Builder attempts</text>
  <text x="315" y="506" text-anchor="end" fill="#f87171" font-size="11" font-weight="600">1</text>
  <text x="50" y="526" fill="#64748b" font-size="11">Test Writer attempts</text>
  <text x="315" y="526" text-anchor="end" fill="#f87171" font-size="11" font-weight="600">2</text>
  <text x="50" y="546" fill="#64748b" font-size="11">Healer attempts</text>
  <text x="315" y="546" text-anchor="end" fill="#f87171" font-size="11" font-weight="600">2</text>
  <text x="50" y="566" fill="#64748b" font-size="11">Repeated identical failure</text>
  <text x="315" y="566" text-anchor="end" fill="#f87171" font-size="11" font-weight="600">abort</text>

  <!-- ── AGENTS box ── -->
  <rect x="30" y="620" width="310" height="130" rx="10" fill="#1e2435" stroke="#334155" stroke-width="1.2"/>
  <text x="185" y="642" text-anchor="middle" fill="#94a3b8" font-size="12" font-weight="700">AGENT MODELS</text>
  <line x1="50" y1="648" x2="320" y2="648" stroke="#334155" stroke-width="1"/>
  <rect x="50" y="660" width="10" height="10" rx="2" fill="#7c3aed"/>
  <text x="70" y="669" fill="#c4b5fd" font-size="11" font-weight="600">POM Builder</text>
  <text x="270" y="669" text-anchor="end" fill="#94a3b8" font-size="10">claude-sonnet-4 · 15 turns</text>
  <text x="70" y="683" fill="#64748b" font-size="10">Tools: Read Write Edit Glob Grep Bash</text>

  <rect x="50" y="694" width="10" height="10" rx="2" fill="#7c3aed"/>
  <text x="70" y="703" fill="#c4b5fd" font-size="11" font-weight="600">Test Writer</text>
  <text x="270" y="703" text-anchor="end" fill="#94a3b8" font-size="10">claude-sonnet-4 · 10 turns</text>
  <text x="70" y="717" fill="#64748b" font-size="10">Tools: Read Write Edit Glob Grep Bash</text>

  <rect x="50" y="728" width="10" height="10" rx="2" fill="#7c3aed"/>
  <text x="70" y="737" fill="#c4b5fd" font-size="11" font-weight="600">Healer</text>
  <text x="270" y="737" text-anchor="end" fill="#94a3b8" font-size="10">claude-sonnet-4 · 8 turns</text>
  <text x="70" y="751" fill="#64748b" font-size="10">Tools: Read Edit Bash Glob Grep</text>

  <!-- ── ARROWHEAD MARKERS ── -->
  <defs>
    <marker id="arr" viewBox="0 0 8 6" refX="6" refY="3" markerWidth="6" markerHeight="5" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#475569"/>
    </marker>
    <marker id="arrRed" viewBox="0 0 8 6" refX="6" refY="3" markerWidth="6" markerHeight="5" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#f43f5e"/>
    </marker>
    <marker id="arrGreen" viewBox="0 0 8 6" refX="6" refY="3" markerWidth="6" markerHeight="5" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#10b981"/>
    </marker>
    <marker id="arrAmb" viewBox="0 0 8 6" refX="6" refY="3" markerWidth="6" markerHeight="5" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#f59e0b"/>
    </marker>
    <marker id="arrPurp" viewBox="0 0 8 6" refX="6" refY="3" markerWidth="6" markerHeight="5" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#7c3aed"/>
    </marker>
  </defs>

</svg>
